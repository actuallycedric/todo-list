<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clarence cesante</title>
    <link href="./styles.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+TC:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="greet">
      <h1>to-do list</h1>
      <div class="stack">
        <img src="./logo.png" alt="react logo" />
        <img src="./supabase-icon.svg" alt="supabase logo" />
        <img src="./javascript-logo-svgrepo-com.svg" alt="js logo" />
      </div>
    </div>

    <div class="bio">
      <h2>
        i'm a grade 12 student and future student of the university of toronto.
        i'm pursuing a degree in computer science, one of my passions. in the
        future, i hope to become a competent full-stack web developer. try out
        my to-do list!

        <br /><br />
        - clarence
      </h2>
    </div>

    <div class="contact">
      <form>
        <input type="text" placeholder="event name" /><br />

        <input type="text" placeholder="event time" />
        <select>
          <option value="">reminder type:</option>
          <option value="comment">action</option>
          <option value="question">event</option>
        </select>

        <button>add</button>
      </form>

      <!--- make this section appear when a button is clicked -->
    </div>

    <div class="list">
      <h2>to do:</h2>
      <br>
      <div class="reminder"><p>do homework</p> <button>mark done</button> <button>delete</button></div>
    </div>
  </body>
</html>
